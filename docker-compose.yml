services:
  db:
    image: postgres:16
    container_name: atech_db
    environment:
      POSTGRES_DB: atechdb
      POSTGRES_USER: atech
      POSTGRES_PASSWORD: atechpass
    volumes:
      - db_data:/var/lib/postgresql/data
    # expón 5432 SOLO si necesitas acceder desde fuera de Docker
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atech -d atechdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: kenner23016/atech:v1   # <-- tu imagen en Docker Hub
    container_name: atech_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: atechdb
      DB_USERNAME: atech
      DB_PASSWORD: atechpass
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:


